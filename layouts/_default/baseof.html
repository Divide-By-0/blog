<!DOCTYPE html>
<html lang="en">
  <head>
    {{- partial "head.html" . -}}
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="grid-container">
      <div class="noise-layer"></div>
      <div class="noise-container">
        <main>
          {{- partial "header.html" . -}}
          <div class="mainPage">
            <div id="content">{{- block "main" . }}{{- end }}</div>
          </div>
          <div class="subscribe-section">
              <p class="subscribe-label">Subscribe for new posts</p>
              <form id="subscribe-form"
                    action="https://docs.google.com/forms/d/e/1FAIpQLSeIgM1SOXC8f_Y6-44A2zFYJw6fF8MeNWdESHZAVkE_qJtGZw/formResponse"
                    method="POST" target="subscribe-iframe">
                  <input type="email" name="emailAddress" placeholder="your@email.com" required>
                  <input type="text" name="entry.1258567013" class="subscribe-feedback" placeholder="Questions / feedback (optional)">
                  <button type="submit">Subscribe</button>
              </form>
              <!-- NOTE: Hidden iframe receives the Google Form redirect so the page doesn't navigate away -->
              <iframe name="subscribe-iframe" id="subscribe-iframe" style="display:none"></iframe>
              <p class="subscribe-success" id="subscribe-success" style="display:none">Thanks for subscribing!</p>
          </div>
          <div class="mainPage">
            {{- partial "footer.html" . -}}
          </div>
        </main>
      </div>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', (event) => {
        document.querySelectorAll('.spoiler').forEach(function(spoiler) {
          spoiler.addEventListener('click', function() {
            spoiler.classList.toggle('active');
          });
        });

        var subForm = document.getElementById('subscribe-form');
        if (subForm) {
          subForm.addEventListener('submit', function() {
            // NOTE: We can't read the Google Form response (cross-origin iframe),
            // so we show success after a short delay. The form POST still goes through.
            // Google Form auto-records the Timestamp column — no need to send it.
            setTimeout(function() {
              subForm.style.display = 'none';
              document.getElementById('subscribe-success').style.display = 'block';
            }, 500);
          });
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
      feather.replace({
        'width': 14,   // Set the width of the icons
        'height': 14   // Set the height of the icons
      });
    </script>
  </body>
</html>
